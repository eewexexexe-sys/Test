<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gigafile Video Player</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel pour compiler le JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #525252; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #737373; }
    </style>
</head>
<body class="bg-neutral-900 text-neutral-100 font-sans min-h-screen selection:bg-indigo-500 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Données de secours
        const SAMPLE_JSON = {
          "pages": { "max": 10, "current": "1", "path": "0907-c77b988023223f8ce004756938da5e46" },
          "html": "<div class='image-area'><div data-val='./upload/B/0907-c77b988023223f8ce004756938da5e46/1.jpg' class='pin ' filetype='image' data-mime='image/jpeg' data-isimage='1'></div><a class='image-data' href='view_image_page-sp.php?file=0907-c77b988023223f8ce004756938da5e46&path=./upload/B/0907-c77b988023223f8ce004756938da5e46/1.jpg' target='_blank'><img src='./upload/B/thumb/0907-c77b988023223f8ce004756938da5e46/1_300x300.jpg' alt='1.jpg' title='1.jpg'><div class='comment_count count0' data-val='0'>0</div></a><div class='image-title'>1.jpg</div></div><div class='image-area'><div data-val='./upload/B/0907-c77b988023223f8ce004756938da5e46/1.mov' class='pin ' filetype='other' data-mime='video/quicktime' data-isimage=''></div><a class='image-data' href='view_data.php?file=0907-c77b988023223f8ce004756938da5e46&path=./upload/B/0907-c77b988023223f8ce004756938da5e46/1.mov' target='_blank'><img src='./upload/B/thumb/0907-c77b988023223f8ce004756938da5e46/1_300x300.mov.png' alt='1.mov' title='1.mov'><div class='comment_count count0' data-val='0'>0</div></a><div class='image-title'>1.mov</div></div><div class='image-area'><div data-val='./upload/B/0907-c77b988023223f8ce004756938da5e46/10.mp4' class='pin ' filetype='other' data-mime='video/mp4' data-isimage=''></div><a class='image-data' href='view_data.php?file=0907-c77b988023223f8ce004756938da5e46&path=./upload/B/0907-c77b988023223f8ce004756938da5e46/10.mp4' target='_blank'><img src='./upload/B/thumb/0907-c77b988023223f8ce004756938da5e46/10_300x300.mp4.png' alt='10.mp4' title='10.mp4'><div class='comment_count count0' data-val='0'>0</div></a><div class='image-title'>10.mp4</div></div><div class='image-area'><div data-val='./upload/B/0907-c77b988023223f8ce004756938da5e46/11.mp4' class='pin ' filetype='other' data-mime='video/quicktime' data-isimage=''></div><a class='image-data' href='view_data.php?file=0907-c77b988023223f8ce004756938da5e46&path=./upload/B/0907-c77b988023223f8ce004756938da5e46/11.mp4' target='_blank'><img src='./upload/B/thumb/0907-c77b988023223f8ce004756938da5e46/11_300x300.mp4.png' alt='11.mp4' title='11.mp4'><div class='comment_count count0' data-val='0'>0</div></a><div class='image-title'>11.mp4</div></div><div class='image-area'><div data-val='./upload/B/0907-c77b988023223f8ce004756938da5e46/13.MP4' class='pin ' filetype='other' data-mime='video/mp4' data-isimage=''></div><a class='image-data' href='view_data.php?file=0907-c77b988023223f8ce004756938da5e46&path=./upload/B/0907-c77b988023223f8ce004756938da5e46/13.MP4' target='_blank'><img src='./upload/B/thumb/0907-c77b988023223f8ce004756938da5e46/13_300x300.MP4.png' alt='13.MP4' title='13.MP4'><div class='comment_count count0' data-val='0'>0</div></a><div class='image-title'>13.MP4</div></div><div class='image-area'><div data-val='./upload/B/0907-c77b988023223f8ce004756938da5e46/14.mp4' class='pin ' filetype='other' data-mime='video/mp4' data-isimage=''></div><a class='image-data' href='view_data.php?file=0907-c77b988023223f8ce004756938da5e46&path=./upload/B/0907-c77b988023223f8ce004756938da5e46/14.mp4' target='_blank'><img src='./upload/B/thumb/0907-c77b988023223f8ce004756938da5e46/14_300x300.mp4.png' alt='14.mp4' title='14.mp4'><div class='comment_count count0' data-val='0'>0</div></a><div class='image-title'>14.mp4</div></div>"
        };

        function App() {
          const [url, setUrl] = useState('https://fly14.gigafile.nu/get_thumblist.php?path=0907-c77b988023223f8ce004756938da5e46&page_imgs=20&page=1&_=1781404708247');
          const [videos, setVideos] = useState([]);
          const [activeVideo, setActiveVideo] = useState(null);
          const [loading, setLoading] = useState(false);
          const [error, setError] = useState('');
          const videoRef = useRef(null);

          const extractVideosFromHtml = (htmlString) => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlString, 'text/html');
            const areas = doc.querySelectorAll('.image-area');
            const extractedVideos = [];
            const baseUrl = 'https://fly14.gigafile.nu';

            areas.forEach((area, index) => {
              const pin = area.querySelector('.pin');
              
              if (pin && pin.getAttribute('data-mime')?.startsWith('video/')) {
                const dataVal = pin.getAttribute('data-val');
                const title = area.querySelector('.image-title')?.textContent || `Vidéo ${index + 1}`;
                const imgNode = area.querySelector('img');
                const thumbSrc = imgNode ? imgNode.getAttribute('src') : '';
                const aNode = area.querySelector('a.image-data');
                const viewerHref = aNode ? aNode.getAttribute('href') : '';

                const videoSrc = dataVal ? baseUrl + dataVal.substring(1) : '';
                const thumbnail = thumbSrc ? baseUrl + thumbSrc.substring(1) : '';

                extractedVideos.push({
                  id: index.toString(),
                  title,
                  videoSrc,
                  thumbnail,
                  mimeType: pin.getAttribute('data-mime')
                });
              }
            });

            return extractedVideos;
          };

          useEffect(() => {
            // Charger les données de secours au lancement
            const initialVideos = extractVideosFromHtml(SAMPLE_JSON.html);
            setVideos(initialVideos);
            if (initialVideos.length > 0) setActiveVideo(initialVideos[0]);
          }, []);

          const fetchData = async () => {
            if (!url) return;
            setLoading(true);
            setError('');

            // Liste de proxys CORS publics. Si l'un échoue, on passe au suivant.
            const proxies = [
              { url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`, type: 'raw' },
              { url: `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, type: 'wrapped' },
              { url: `https://corsproxy.io/?${encodeURIComponent(url)}`, type: 'raw' }
            ];

            let success = false;
            let parsedJson = null;

            for (const proxy of proxies) {
              try {
                const response = await fetch(proxy.url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                if (proxy.type === 'wrapped') {
                  const data = await response.json();
                  if (!data.contents) throw new Error('Pas de contenu (wrapped)');
                  parsedJson = JSON.parse(data.contents);
                } else {
                  parsedJson = await response.json();
                }
                
                success = true;
                break; // Le proxy a fonctionné, on arrête de chercher
              } catch (err) {
                console.warn(`Proxy échoué: ${proxy.url}`, err);
              }
            }

            try {
              if (!success || !parsedJson) {
                throw new Error("Impossible de joindre l'URL. Les bloqueurs de publicités ou proxys empêchent la connexion.");
              }

              if (parsedJson.html) {
                const extractedVideos = extractVideosFromHtml(parsedJson.html);
                if (extractedVideos.length === 0) {
                  setError("Aucune vidéo trouvée sur ce lien.");
                } else {
                  setVideos(extractedVideos);
                  setActiveVideo(extractedVideos[0]);
                }
              } else {
                throw new Error("Format des données inattendu.");
              }
            } catch (err) {
              setError(`Erreur: ${err.message}`);
              // Fallback en cas d'erreur
              const fallbackVideos = extractVideosFromHtml(SAMPLE_JSON.html);
              setVideos(fallbackVideos);
              if (fallbackVideos.length > 0) setActiveVideo(fallbackVideos[0]);
            } finally {
              setLoading(false);
            }
          };

          const handleVideoSelect = (video) => {
            setActiveVideo(video);
            if (videoRef.current) {
              videoRef.current.load();
              videoRef.current.play().catch(e => console.log("Lecture automatique bloquée par le navigateur"));
            }
          };

          return (
            <div>
              <header className="bg-neutral-950 border-b border-neutral-800 p-4 sticky top-0 z-10 shadow-md">
                <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center gap-4">
                  <div className="flex items-center gap-2 text-indigo-400">
                    <i className="ph-fill ph-film-strip text-3xl"></i>
                    <h1 className="text-xl font-bold tracking-tight">GigaPlayer</h1>
                  </div>
                  
                  <div className="flex-1 w-full flex gap-2">
                    <input 
                      type="text" 
                      value={url}
                      onChange={(e) => setUrl(e.target.value)}
                      placeholder="URL de l'API Gigafile (ex: https://fly14...)"
                      className="flex-1 bg-neutral-800 border border-neutral-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
                    />
                    <button 
                      onClick={fetchData}
                      disabled={loading}
                      className="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg flex items-center gap-2 font-medium transition-colors disabled:opacity-50"
                    >
                      {loading ? <i className="ph ph-spinner animate-spin text-lg"></i> : <i className="ph ph-arrows-clockwise text-lg"></i>}
                      <span className="hidden sm:inline">Charger</span>
                    </button>
                  </div>
                </div>
              </header>

              <main className="max-w-7xl mx-auto p-4 flex flex-col lg:flex-row gap-6">
                <section className="flex-1 flex flex-col gap-4">
                  {error && (
                    <div className="bg-red-900/50 border border-red-500/50 text-red-200 px-4 py-3 rounded-lg flex items-start gap-3">
                      <i className="ph-fill ph-warning-circle text-xl mt-0.5 shrink-0"></i>
                      <p className="text-sm">{error}</p>
                    </div>
                  )}

                  <div className="bg-black rounded-xl overflow-hidden shadow-2xl ring-1 ring-neutral-800 aspect-video relative flex items-center justify-center">
                    {activeVideo ? (
                      <video 
                        ref={videoRef}
                        controls 
                        autoPlay
                        playsInline
                        className="w-full h-full object-contain"
                        poster={activeVideo.thumbnail}
                      >
                        <source src={activeVideo.videoSrc} type={activeVideo.mimeType} />
                        Votre navigateur ne supporte pas la vidéo.
                      </video>
                    ) : (
                      <div className="text-neutral-500 flex flex-col items-center gap-2">
                        <i className="ph ph-video text-5xl opacity-20"></i>
                        <p>Aucune vidéo</p>
                      </div>
                    )}
                  </div>

                  {activeVideo && (
                    <div className="bg-neutral-800 rounded-xl p-5 shadow-lg border border-neutral-700 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                      <div className="min-w-0 flex-1">
                        <h2 className="text-lg sm:text-xl font-bold text-white truncate">{activeVideo.title}</h2>
                        <p className="text-neutral-400 text-sm mt-1">Format: {activeVideo.mimeType.split('/')[1]?.toUpperCase() || 'Inconnu'}</p>
                      </div>
                      <a 
                        href={activeVideo.videoSrc} 
                        target="_blank" 
                        rel="noopener noreferrer"
                        className="w-full sm:w-auto bg-neutral-700 hover:bg-neutral-600 text-white px-4 py-3 sm:py-2 rounded-lg flex items-center justify-center gap-2 text-sm font-medium transition-colors shrink-0"
                      >
                        <i className="ph ph-download-simple text-lg"></i>
                        Fichier brut
                      </a>
                    </div>
                  )}
                </section>

                <aside className="w-full lg:w-96 flex flex-col gap-4">
                  <div className="flex items-center justify-between">
                    <h3 className="text-lg font-semibold text-neutral-200 flex items-center gap-2">
                      <i className="ph-fill ph-play-circle text-indigo-400 text-xl"></i>
                      Liste de lecture ({videos.length})
                    </h3>
                  </div>

                  <div className="bg-neutral-800 border border-neutral-700 rounded-xl overflow-hidden flex flex-col max-h-[400px] lg:max-h-[600px]">
                    <div className="overflow-y-auto p-2 flex flex-col gap-1 custom-scrollbar">
                      {videos.length > 0 ? (
                        videos.map((video) => (
                          <button
                            key={video.id}
                            onClick={() => handleVideoSelect(video)}
                            className={`flex items-center gap-3 p-2 rounded-lg text-left transition-all group w-full ${
                              activeVideo?.id === video.id 
                                ? 'bg-indigo-600/20 ring-1 ring-indigo-500/50' 
                                : 'hover:bg-neutral-700/50'
                            }`}
                          >
                            <div className="relative w-20 sm:w-24 h-14 sm:h-16 shrink-0 bg-black rounded-md overflow-hidden ring-1 ring-white/10">
                              {video.thumbnail ? (
                                <img src={video.thumbnail} alt={video.title} className="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" />
                              ) : (
                                <div className="w-full h-full flex items-center justify-center text-neutral-600">
                                  <i className="ph ph-film text-xl"></i>
                                </div>
                              )}
                              <div className={`absolute inset-0 bg-black/40 flex items-center justify-center ${activeVideo?.id === video.id ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'} transition-opacity`}>
                                <i className={`ph-fill ph-play text-xl ${activeVideo?.id === video.id ? "text-indigo-400" : "text-white"}`}></i>
                              </div>
                            </div>
                            <div className="flex-1 min-w-0">
                              <p className={`text-sm font-medium truncate ${activeVideo?.id === video.id ? 'text-indigo-300' : 'text-neutral-200'}`}>
                                {video.title}
                              </p>
                              <p className="text-xs text-neutral-500 mt-1 uppercase">
                                {video.mimeType.split('/')[1] || 'VIDEO'}
                              </p>
                            </div>
                          </button>
                        ))
                      ) : (
                        <div className="p-8 text-center text-neutral-500 text-sm">
                          {loading ? 'Recherche...' : 'Aucune vidéo disponible.'}
                        </div>
                      )}
                    </div>
                  </div>
                </aside>
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
